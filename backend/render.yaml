# ────────────────────────────────────────────────────────────────
# Render Blueprint — Infrastructure-as-Code for Render.com
# https://render.com/docs/blueprint-spec
# ────────────────────────────────────────────────────────────────

services:
  - type: web
    name: recall-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free  # upgrade to "starter" for more RAM / CPU

    # Health check
    healthCheckPath: /health

    # Environment variables — set actual values in the Render dashboard
    envVars:
      - key: DATABASE_URL
        sync: false  # Set manually in Render dashboard
      - key: GOOGLE_SERVICE_ACCOUNT_BASE64
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: INSIGHTFACE_MODEL
        value: buffalo_sc
      - key: SIMILARITY_THRESHOLD
        value: "0.55"
      - key: CORS_ORIGINS
        sync: false  # Set to your frontend URL
      - key: INDEXING_CONCURRENCY
        value: "3"
      - key: PORT
        value: "8000"
